# Production vtuber worker stack.
#
# Standalone:
#   docker compose -f compose.prod.yaml --env-file .env up -d
#
# Services:
#   - payment-daemon  (receiver mode, Arbitrum One)
#   - session-runner  (local backend for /api/sessions/start)
#   - vtuber-worker   (public worker HTTP surface)
#
# This stack intentionally does NOT include a service-registry publisher.
# Current recommended first-production posture is:
#   - deploy one worker host
#   - register it statically in the bridge / orchestrator
#   - add resolver/publisher automation later

name: livepeer-vtuber-worker

services:
  payment-daemon:
    image: tztcloud/livepeer-payment-daemon:${PAYMENT_DAEMON_IMAGE_TAG:-v4.0.1}
    restart: unless-stopped
    command:
      - --mode=receiver
      - --socket=/var/run/livepeer/payment-daemon.sock
      - --store-path=/var/lib/livepeer/payment-daemon.db
      - --config=/etc/livepeer/worker.yaml
      - --chain-rpc=${CHAIN_RPC:?set CHAIN_RPC (Arbitrum One RPC URL)}
      - --keystore-path=/etc/livepeer/keystore.json
      - --keystore-password-file=/etc/livepeer/keystore-password
      - --redemption-interval=30s
      - --log-level=${DAEMON_LOG_LEVEL:-info}
    volumes:
      - ${WORKER_YAML_PATH:-./worker.yaml}:/etc/livepeer/worker.yaml:ro
      - ${RECIPIENT_KEYSTORE_PATH:-./keystore.json}:/etc/livepeer/keystore.json:ro
      - ${RECIPIENT_KEYSTORE_PASSWORD_PATH:-./keystore-password}:/etc/livepeer/keystore-password:ro
      - payment-daemon-sock:/var/run/livepeer
      - payment-daemon-data:/var/lib/livepeer
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512m
    security_opt:
      - no-new-privileges:true

  session-runner:
    image: ${SESSION_RUNNER_IMAGE:?set SESSION_RUNNER_IMAGE}
    restart: unless-stopped
    environment:
      SESSION_RUNNER_HTTP_HOST: 0.0.0.0
      SESSION_RUNNER_HTTP_PORT: 8080
      SESSION_RUNNER_LOG_LEVEL: ${SESSION_RUNNER_LOG_LEVEL:-info}
      SESSION_RUNNER_LOG_FORMAT: ${SESSION_RUNNER_LOG_FORMAT:-json}
      SESSION_RUNNER_RENDERER: ${SESSION_RUNNER_RENDERER:-chromium}
      SESSION_RUNNER_RENDERER_DIST: /app/avatar-renderer/dist
      SESSION_RUNNER_LLM: ${SESSION_RUNNER_LLM:-mock}
      SESSION_RUNNER_TTS: ${SESSION_RUNNER_TTS:-mock}
      SESSION_RUNNER_OPENAI_BRIDGE_URL: ${SESSION_RUNNER_OPENAI_BRIDGE_URL:-}
      SESSION_RUNNER_OPENAI_BRIDGE_KEY: ${SESSION_RUNNER_OPENAI_BRIDGE_KEY:-}
    expose:
      - "8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g
    security_opt:
      - no-new-privileges:true

  vtuber-worker:
    image: ${VTUBER_WORKER_IMAGE:?set VTUBER_WORKER_IMAGE}
    restart: unless-stopped
    depends_on:
      - payment-daemon
      - session-runner
    command:
      - --config=/etc/livepeer/worker.yaml
      - --log-level=${WORKER_LOG_LEVEL:-info}
      - --metrics-listen=${METRICS_PORT:+:${METRICS_PORT}}
    volumes:
      - ${WORKER_YAML_PATH:-./worker.yaml}:/etc/livepeer/worker.yaml:ro
      - payment-daemon-sock:/var/run/livepeer:ro
    ports:
      - "${WORKER_HOST_PORT:-8080}:8080"
    networks:
      - default
      - cf-tunnel
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1g
    security_opt:
      - no-new-privileges:true

volumes:
  payment-daemon-sock:
  payment-daemon-data:

networks:
  default:
  cf-tunnel:
    external: true
