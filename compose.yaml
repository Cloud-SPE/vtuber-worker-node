# Dev-friendly compose for the worker + payment daemon duo. Both
# containers read the SAME worker.yaml via a read-only bind mount at
# /etc/livepeer/worker.yaml.
#
# Production deployments will:
#   - Drop the `additional_contexts` block (the library will be a
#     tagged Go module, not a sibling checkout).
#   - Replace the fake broker mode with real `--chain-rpc` +
#     `--keystore-path`.
#   - Point backend_url entries at actual inference servers.
#
# Bring it up with:
#   docker compose up --build
#
# Then hit the worker:
#   curl http://localhost:8080/health
#   curl http://localhost:8080/capabilities

services:
  payment-daemon:
    # Pinned to the published image. The new-lineage source-of-truth
    # is livepeer-modules-project/payment-daemon (its plan 0002), but
    # the daemon Dockerfile there has a chain-commons-context gap;
    # the published `tztcloud/livepeer-payment-daemon` image (cut from
    # the standalone repo before it was folded) is what actually runs
    # in dev. Switch to a new-lineage image tag is one env-var change
    # once livepeer-modules-project's plan 0008 publishes.
    image: tztcloud/livepeer-payment-daemon:${PAYMENT_DAEMON_IMAGE_TAG:-v0.8.10}
    command:
      - "--mode=receiver"
      - "--socket=/var/run/livepeer/payment-daemon.sock"
      - "--store-path=/var/lib/livepeer/payment-daemon.db"
      - "--config=/etc/livepeer/worker.yaml"
      - "--log-level=info"
    volumes:
      - ./worker.yaml:/etc/livepeer/worker.yaml:ro
      - payment-daemon-sock:/var/run/livepeer
      - payment-daemon-data:/var/lib/livepeer
    restart: unless-stopped

  vtuber-worker:
    build:
      # Default context = this repo.
      context: .
      # Expose the modules-project siblings to the build. Required
      # while go.mod has `replace` directives; all three drop out
      # once livepeer-modules-project publishes tagged Go modules
      # (its plan 0008).
      #
      # `chain_commons` is needed because both daemons transitively
      # replace it in their own go.mod files; Go's replace doesn't
      # propagate from libraries, so the worker's go.mod has its own
      # chain-commons replace and the build needs the dir present.
      additional_contexts:
        library: ../livepeer-modules-project/payment-daemon
        registry: ../livepeer-modules-project/service-registry-daemon
        chain_commons: ../livepeer-modules-project/chain-commons
    command:
      - "--config=/etc/livepeer/worker.yaml"
      - "--log-level=info"
      # METRICS_PORT activates the Prometheus /metrics listener inside
      # the container. Set in .env (or shell) to e.g. 9093 to enable;
      # when unset the flag is empty and the listener stays off.
      - "--metrics-listen=${METRICS_PORT:+:${METRICS_PORT}}"
    ports:
      - "8080:8080"
    volumes:
      - ./worker.yaml:/etc/livepeer/worker.yaml:ro
      - payment-daemon-sock:/var/run/livepeer:ro
    depends_on:
      - payment-daemon
    restart: unless-stopped

volumes:
  payment-daemon-sock:
  payment-daemon-data:
